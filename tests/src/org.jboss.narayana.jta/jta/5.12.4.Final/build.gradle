plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.jboss.narayana.jta:jta:$libraryVersion"
    // JTA API types (javax.transaction.*) needed at compile time for tests
    testImplementation "javax.transaction:javax.transaction-api:1.3"
    testImplementation 'org.assertj:assertj-core:3.22.0'

    // Provide UserTransaction operations provider required by Narayana at runtime
    testRuntimeOnly "org.jboss:jboss-transaction-spi:7.6.1.Final"
}
